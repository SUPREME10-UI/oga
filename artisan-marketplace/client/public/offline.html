<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArtisanHub - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #3B1F0A;
      color: #F5F0E8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #D97706;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #C9A96E;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .retry-btn {
      background: #D97706;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .retry-btn:active { opacity: 0.8; }
    .tips {
      margin-top: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      max-width: 320px;
      text-align: left;
    }
    .tips h3 { font-size: 14px; color: #D97706; margin-bottom: 12px; }
    .tips li { font-size: 13px; color: #C9A96E; margin-bottom: 8px; list-style: none; padding-left: 20px; position: relative; }
    .tips li::before { content: "•"; position: absolute; left: 4px; color: #D97706; }
  </style>
</head>
<body>
  <img
    src="https://d2xsxph8kpxj0f.cloudfront.net/310519663448971800/WP54uqojT2hdzD6eefaKhT/artisan-icon-192_dc8fb7ba.png"
    alt="ArtisanHub"
    class="icon"
  />
  <h1>You're Offline</h1>
  <p>No internet connection detected. Check your network and try again to connect with local artisans.</p>
  <button class="retry-btn" onclick="window.location.reload()">
    🔄 Try Again
  </button>

  <div class="tips">
    <h3>While you wait:</h3>
    <ul>
      <li>Check your Wi-Fi or mobile data</li>
      <li>Try switching between Wi-Fi and data</li>
      <li>Move to an area with better signal</li>
      <li>Your data will sync when you reconnect</li>
    </ul>
  </div>

  <script>
    // Auto-retry when connection is restored
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
